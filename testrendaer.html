<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>わんコメ テストコメント連打er</title>
<style>
  body { font-family: sans-serif; padding: 20px; }
  .row { margin-top: 10px; }

  .container { max-width: 600px; margin: 0 auto; padding: 0 1rem; }
  .datacontainer { display: flex; column-gap: 20px; }
  .block { display: flex; flex-direction: column; flex: 1; }
  textarea { width: 100%; box-sizing: border-box; resize: vertical; }

  .actionModeSelection {
    span { margin-right: 5px; };
    input { margin-right: -2px; };
  }

  @media (max-width: 600px) {
    .datacontainer {
      flex-direction: column;
    }
  }
</style>
</head>
<body>
<div class="container">
  <h2>わんコメ テストコメント連打er</h2>

  <div class="datacontainer">
    <div class="block">
      <label for="usernames">ユーザ名：</label>
      <textarea id="usernames" rows="5" cols="20" wrap="off" autocomplete="off">ずんだもん&NewLine;あんこもん&NewLine;きなこもん&NewLine;そーだもん</textarea>
    </div>
    <div class="block">
      <label for="comments">コメント内容：</label>
      <textarea id="comments" rows="5" cols="20" wrap="off" autocomplete="off">のだ&NewLine;なのだ&NewLine;ちがうのだ&NewLine;かもなのだ</textarea>
    </div>
  </div>
  <form>
    <fieldset class="actionModeSelection">
      <legend>動作モード</legend>
      <span class="actionModeSelection">
      <input type="radio" id="actionModeSingle" name="actionMode" value="single" checked />
      <label for="actionModeSingle">先頭</label>
      </span>
      <span class="actionModeSelection">
      <input type="radio" id="actionModeList" name="actionMode" value="list" />
      <label for="actionModeList">リスト順</label>
      </span>
      <span class="actionModeSelection">
      <input type="radio" id="actionModeRandom" name="actionMode" value="random" />
      <label for="actionModeRandom">ランダム</label>
      </span>
    </fieldset>
  </form>

  <div class="row">
    <button id="sendSingle">単発送信</button>
  </div>

  <div class="row">
    <div>
    <label for="startstop">連続送信 </label>
    <button id="startstop">Start</button>
    <progress id="gauge" value="0.0" max="1">10</progress>
    </div>
    <div>
    <label for="interval">送信間隔：</label>
    <input id="interval" type="range" min="100" max="2000" value="1000" step="50">
    <span id="intervalValue">1000</span> ms
    </div>
  </div>
</div>
<script>
document.getElementById("interval").addEventListener("input", e => {
  document.getElementById("intervalValue").textContent = e.target.value;
});

let listIndex = 0;

function sendOne() {
  const getLines = (text) => {
    const lines = text.split("\n").map(s=>s.trim()).filter(s=>s.length>0);
    return lines;
  }
  const usernames = getLines(document.getElementById("usernames").value);
  const comments = getLines(document.getElementById("comments").value);

  let username = "";
  let comment = "";
  const selectedMode = document.querySelector('input[name="actionMode"]:checked').value;
  switch (selectedMode) {
    case "list":
      username = usernames[listIndex % usernames.length];
      comment = comments[listIndex % comments.length];
      listIndex++;
      if (listIndex > 1e10) listIndex = 0; // 一応あふれないように
      break;
    case "random":
      username = usernames[Math.floor(Math.random() * usernames.length)];
      comment = comments[Math.floor(Math.random() * comments.length)];
      break;
    case "single":
    default:
      username = usernames[0];
      comment = comments[0];
      break;
  }
  // 値が空だとわんコメ側で設定したデフォ値になるようだ

  fetch("http://localhost:11180/api/comments/test", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ 
      "platform": "youtube",
      "hasGift": false,
      "unit": "",
      "price": 0,
      "giftType": "none",
      "newComment": false,
      "repeater": false,
      "subscribe": false,
      "speech": false,
      "username": username,
      "comment": comment
    })
  }).catch(err => console.error(err));
}

document.getElementById("sendSingle").addEventListener("click", () => {
  sendOne();
});

document.getElementById("startstop").addEventListener("click", () => {
  let newtext = "Stop"
  if(running) {
    resetProgress();
    newtext="Start";
  }
  else {
    // sendOne();
    running = true;
    requestAnimationFrame(sendloop);
  }
  document.getElementById("startstop").textContent=newtext;
});

let lastTime = 0;
let running = false;
let progress = 0.0;

function updateGauge() {
  document.getElementById("gauge").value = progress;
}

function resetProgress() {
  lastTime = 0;
  running = false;
  progress = 0.0;
  listIndex = 0;
  updateGauge();
}

function sendloop(timestamp) {
  if(!running) return;
  if(!lastTime) lastTime = timestamp;
  const delta = timestamp - lastTime;
  lastTime = timestamp;

  const interval = Number(document.getElementById("interval").value);
  progress += delta / interval;
  updateGauge();
  if(progress >= 1) {
    progress = 0.0;
    sendOne();
  }
  
  requestAnimationFrame(sendloop);
}
</script>

</body>
</html>
